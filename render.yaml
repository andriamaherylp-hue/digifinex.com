databases:
  - name: digifinex-db
    plan: free
    databaseName: digifinex
    user: digifinex

services:
  - type: web
    name: digifinex-web
    runtime: python
    plan: free
    branch: main
    buildCommand: bash build.sh
    startCommand: gunicorn belou.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: digifinex-db
          property: connectionString
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: "2"
      - key: CREATE_SUPERUSER
        value: "true"
      - key: DJANGO_SUPERUSER_USERNAME
        value: "admin"
      - key: DJANGO_SUPERUSER_EMAIL
        value: "admin@example.com"
      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false
